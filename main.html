<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ForgemasterToolkit</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="page-header">
      <h1>Forgemaster — Item evaluator</h1>
      <div class="header-actions">
        <button id="readme" type="button" class="secondary-btn">Help</button>
      </div>
    </header>

    <div class="card">
      <form id="dps-form" class="evaluator-form">
        <div class="sidebar-actions">
          <div class="row row--stacked" style="gap: 0.5rem;">
            <div class="row row--spaced">
              <button id="store" type="button">Store</button>
              <button id="pull" type="button">Pull from storage</button>
              <button id="reset" type="button">Reset</button>
            </div>
            <div class="row row--spaced">
              <button id="save" type="button">Save (browser localStorage)</button>
              <button id="load" type="button">Load (browser localStorage)</button>
            </div>
            <div class="row row--spaced">
              <button id="export" type="button">Export JSON</button>
              <input id="import-file" type="file" accept="application/json" style="display:none" />
              <button id="import" type="button">Import JSON</button>
            </div>
            <div id="store-status" class="status">No stored data</div>
          </div>
        </div>

        <div class="main-content">
          <div id="slots" class="slots"></div>
          
          <div class="summary-section">
            <h2>Summary</h2>
            <div id="summary-pills-list" class="vertical-summary-pills"></div>
            
            <h3 style="margin-top: 1.5rem;">Current Data (JSON)</h3>
            <div id="preview" class="summary">{ }</div>
          </div>
        </div>
      </form>
    </div>

    <footer>
      <small>Built for prototyping — you can customize substat options and calculations later.</small>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
